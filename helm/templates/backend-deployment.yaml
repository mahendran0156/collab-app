apiVersion: apps/v1
kind: Deployment
metadata:
  name: collab-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: collab-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: collab-backend
  template:
    metadata:
      labels:
        app: collab-backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: {{ .Values.backend.env.PORT | quote }}
            - name: CLIENT_URL
              value: {{ .Values.backend.env.CLIENT_URL | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: collab-secrets
                  key: jwt-secret
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: collab-secrets
                  key: mongo-uri
          resources:
            requests:
              memory: {{ .Values.backend.resources.requests.memory }}
              cpu: {{ .Values.backend.resources.requests.cpu }}
            limits:
              memory: {{ .Values.backend.resources.limits.memory }}
              cpu: {{ .Values.backend.resources.limits.cpu }}
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: collab-backend
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: collab-backend
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 5000
  type: {{ .Values.backend.service.type }}
