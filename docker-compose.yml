version: '3.8'

services:

  # ── MongoDB ──────────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: collab-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - collab-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collab-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/collabdb
      - JWT_SECRET=collab_super_secret_change_in_production
      - CLIENT_URL=http://localhost:3000
    ports:
      - "5000:5000"
    networks:
      - collab-net
    depends_on:
      - mongodb

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collab-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - collab-net
    depends_on:
      - backend

networks:
  collab-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: collab-bridge

volumes:
  mongo_data:
    driver: local
